<!DOCTYPE html>
<html lang="es-cl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encriptador de Texto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="principal">
            <section class="seccionuno">
                <h1></h1>
                <textarea>Ingrese su texto aquí...</textarea>
                <p><label class="alerta">Solo letras minúsculas y sin tildes</label></p>
            </section>
        <div>
        
        <div>
            <section class="botones">
                <button>Encriptar</button>
                <button>Desencriptar</button>
            </section>
        </div>
        
        <div>
            <section class="secciontres">
                <textarea></textarea>
                <p>Ningún mensaje fue encontrado</p>
                <p>Ingresa el texto que desees encriptar o desencriptar.</p>
                <button>Copiar</button>
            </section>
        </div>

        <div class="piedepagina">
            <footer class="footer">
                <p>Desarrollado por Francisco Martínez</p>
            </footer>
        </div>
        <script src="script.js"> </script>
    </main>
</body>
</html>
